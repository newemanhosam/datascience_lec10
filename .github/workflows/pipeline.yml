name : pipeline

on: 
    workflow_dispatch:

jobs:
    run-pipeline:
        runs-on: ubuntu-latest

        env:
            # This is how you can set environment variables in GitHub Actions. 
            # You can access these in your code using os.environ.get("DATA_PATH") for example.
            ENVIRONMENT: ${{vars.model_version}}
            model_version: ${{vars.MODEL_VERSION}}
    
        steps:
        - name: Checkout code
          uses: actions/checkout@v3
    
        - name: Set up Python
          uses: actions/setup-python@v4
          with:
            python-version: "3.11"
    
        - name: Install dependencies
          run: |
            pip install -r requirements.txt
            pip install -e .
    
        - name: Run pipeline
          run: make all
